services:
  flask:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuroflow-flask
    restart: unless-stopped
    command: gunicorn --bind 0.0.0.0:5000 app:app
    environment:
      FLASK_ENV: production
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: mistral
      SQLITE_DB_PATH: /data/neuroflow.db
    volumes:
      - sqlite_data:/data
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
      sqlite:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - neuroflow_net

  ollama:
    image: ollama/ollama:latest
    container_name: neuroflow-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - neuroflow_net

  ollama-pull:
    image: ollama/ollama:latest
    container_name: neuroflow-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ollama pull mistral
    environment:
      OLLAMA_HOST: http://ollama:11434
    networks:
      - neuroflow_net
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    container_name: neuroflow-nginx
    depends_on:
      flask:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - neuroflow_net

  sqlite:
    image: keinos/sqlite3:latest
    container_name: neuroflow-sqlite
    command: ["sleep", "infinity"]
    volumes:
      - sqlite_data:/data
    networks:
      - neuroflow_net

networks:
  neuroflow_net:
    driver: bridge

volumes:
  sqlite_data:
  ollama_data:

